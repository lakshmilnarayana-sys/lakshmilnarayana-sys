<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Lakshmi Narayana Vommi — Engineering Leader, Platform and SRE, Chaos and Resilience, Agentic AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b18"/>
      <stop offset="0.5" stop-color="#0f1230"/>
      <stop offset="1" stop-color="#1a0e2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#e879f9"/>
    </linearGradient>
    <radialGradient id="glowfade" cx="0.78" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#6d28d9" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#glowfade)"/>
  <!-- faint grid -->
  <g stroke="#9aa4ff" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 80 H1280 M0 160 H1280 M0 240 H1280"/>
    <path d="M160 0 V320 M320 0 V320 M480 0 V320 M640 0 V320 M800 0 V320 M960 0 V320 M1120 0 V320"/>
  </g>
  <rect x="3" y="3" width="1274" height="314" rx="14" fill="none" stroke="url(#accent)" stroke-opacity="0.45" stroke-width="2"/>

  <!-- neural network motif (right) -->
  <g stroke="url(#accent)" stroke-opacity="0.30" stroke-width="1.2">
    <!-- L1(x=950) -> L2(x=1065) -->
    <line x1="950" y1="80"  x2="1065" y2="70"/>
    <line x1="950" y1="80"  x2="1065" y2="160"/>
    <line x1="950" y1="160" x2="1065" y2="70"/>
    <line x1="950" y1="160" x2="1065" y2="160"/>
    <line x1="950" y1="160" x2="1065" y2="250"/>
    <line x1="950" y1="240" x2="1065" y2="160"/>
    <line x1="950" y1="240" x2="1065" y2="250"/>
    <!-- L2 -> L3(x=1180) -->
    <line x1="1065" y1="70"  x2="1180" y2="120"/>
    <line x1="1065" y1="160" x2="1180" y2="120"/>
    <line x1="1065" y1="160" x2="1180" y2="200"/>
    <line x1="1065" y1="250" x2="1180" y2="200"/>
  </g>
  <g filter="url(#glow)">
    <g fill="#22d3ee">
      <circle cx="950" cy="80" r="7"/><circle cx="950" cy="160" r="7"/><circle cx="950" cy="240" r="7"/>
    </g>
    <g fill="#818cf8">
      <circle cx="1065" cy="70" r="7"/><circle cx="1065" cy="160" r="8"/><circle cx="1065" cy="250" r="7"/>
    </g>
    <g fill="#e879f9">
      <circle cx="1180" cy="120" r="7"/><circle cx="1180" cy="200" r="7"/>
    </g>
  </g>

  <!-- text (left) -->
  <text x="64" y="120" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="50" font-weight="700" fill="#f8fafc">Lakshmi Narayana Vommi</text>
  <text x="66" y="166" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="21" fill="url(#accent)" font-weight="600">🧭 Engineering Leader · ☸ Platform &amp; SRE · 🔥 Chaos/Resilience · 🤖 Agentic AI</text>
  <text x="66" y="208" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#9aa4d4">20+ yrs · Kubernetes · Observability · Multi-Agent Systems · LLM Evaluation</text>

  <!-- skill chips -->
  <g font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="13" fill="#cbd5ff">
    <g><rect x="66"  y="240" width="118" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="url(#accent)" stroke-opacity="0.5"/><text x="125" y="260" text-anchor="middle">LangGraph</text></g>
    <g><rect x="196" y="240" width="118" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="url(#accent)" stroke-opacity="0.5"/><text x="255" y="260" text-anchor="middle">Kubernetes</text></g>
    <g><rect x="326" y="240" width="118" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="url(#accent)" stroke-opacity="0.5"/><text x="385" y="260" text-anchor="middle">Observability</text></g>
    <g><rect x="456" y="240" width="100" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="url(#accent)" stroke-opacity="0.5"/><text x="506" y="260" text-anchor="middle">Chaos Eng</text></g>
    <g><rect x="568" y="240" width="92"  height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="url(#accent)" stroke-opacity="0.5"/><text x="614" y="260" text-anchor="middle">Evals</text></g>
  </g>
</svg>
